<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c080"/>
      <stop offset="45%" stop-color="#d4924f"/>
      <stop offset="100%" stop-color="#7a4e24"/>
    </linearGradient>
    <linearGradient id="sage" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e332b"/>
      <stop offset="100%" stop-color="#4d7264"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#d4924f" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2620" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#0a100d" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121c18"/>
      <stop offset="100%" stop-color="#070d0b"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="panelShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="720" height="580" fill="transparent"/>
  <ellipse cx="360" cy="290" rx="280" ry="200" fill="url(#coreGlow)"/>

  <!-- floor grid -->
  <g opacity="0.32">
    <path d="M80 430 L360 300 L640 430" stroke="#3d5a4f" stroke-width="1"/>
    <path d="M160 470 L360 370 L560 470" stroke="#2d4a40" stroke-width="0.75"/>
    <line x1="200" y1="430" x2="200" y2="500" stroke="#2d4a40" stroke-width="0.75"/>
    <line x1="360" y1="300" x2="360" y2="520" stroke="#3d5a4f" stroke-width="1"/>
    <line x1="520" y1="430" x2="520" y2="500" stroke="#2d4a40" stroke-width="0.75"/>
  </g>

  <!-- isometric platform (drawn first so panels float above) -->
  <path d="M140 390 L360 270 L580 390 L360 510 Z" fill="#08100d" stroke="url(#sage)" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M360 270 L580 390 L580 350 L360 230 Z" fill="#0a1410" stroke="url(#sage)" stroke-opacity="0.35"/>
  <path d="M140 390 L360 510 L360 470 L140 350 Z" fill="#09120e" stroke="url(#sage)" stroke-opacity="0.35"/>
  <path d="M200 360 L360 280 L520 360 L360 440 Z" fill="url(#panel)" stroke="url(#copper)" stroke-opacity="0.4"/>
  <path d="M250 335 L360 280 L470 335 L360 390 Z" fill="#101a16" stroke="#d4924f" stroke-opacity="0.6" stroke-width="1.25"/>
  <circle cx="360" cy="325" r="34" fill="#050a08" stroke="url(#copper)" stroke-width="2.5" filter="url(#softGlow)"/>
  <circle cx="360" cy="325" r="12" fill="url(#copper)"/>
  <circle cx="360" cy="325" r="52" stroke="url(#copper)" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 7"/>
  <line x1="360" y1="325" x2="250" y2="360" stroke="#d4924f" stroke-opacity="0.3"/>
  <line x1="360" y1="325" x2="470" y2="360" stroke="#d4924f" stroke-opacity="0.3"/>
  <line x1="360" y1="325" x2="300" y2="410" stroke="#3d5a4f" stroke-opacity="0.45"/>
  <line x1="360" y1="325" x2="420" y2="410" stroke="#3d5a4f" stroke-opacity="0.45"/>
  <circle cx="250" cy="360" r="11" fill="#0c1612" stroke="#d4924f" stroke-opacity="0.5"/>
  <circle cx="470" cy="360" r="11" fill="#0c1612" stroke="#d4924f" stroke-opacity="0.5"/>
  <circle cx="300" cy="410" r="8" fill="#0c1612" stroke="#3d5a4f"/>
  <circle cx="420" cy="410" r="8" fill="#0c1612" stroke="#3d5a4f"/>

  <!-- floating panels — glass-style, semi-transparent -->
  <g filter="url(#panelShadow)">
    <rect x="24" y="40" width="184" height="108" rx="14" fill="url(#panelFill)" stroke="url(#copper)" stroke-opacity="0.5"/>
    <rect x="24" y="40" width="184" height="108" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="44" y="72" fill="#e8b878" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.14em">AI GOVERNANCE</text>
    <text x="44" y="104" fill="#f8faf8" font-family="system-ui,sans-serif" font-size="24" font-weight="800">Production</text>
    <text x="44" y="126" fill="#a8b0ac" font-size="11">Regulated model pipelines</text>
    <rect x="44" y="132" width="120" height="5" rx="2.5" fill="#1a2822"/><rect x="44" y="132" width="96" height="5" rx="2.5" fill="url(#copper)"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="512" y="24" width="184" height="108" rx="14" fill="url(#panelFill)" stroke="#4d7264" stroke-opacity="0.55"/>
    <rect x="512" y="24" width="184" height="108" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="532" y="56" fill="#c4ccc8" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.14em">CLOUD LANDING</text>
    <text x="532" y="88" fill="#f8faf8" font-family="system-ui,sans-serif" font-size="24" font-weight="800">Multi-zone</text>
    <text x="532" y="110" fill="#a8b0ac" font-size="11">IE &amp; UK data residency</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="24" y="452" width="184" height="100" rx="14" fill="url(#panelFill)" stroke="url(#copper)" stroke-opacity="0.4"/>
    <rect x="24" y="452" width="184" height="100" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="44" y="484" fill="#c4ccc8" font-size="10" font-weight="700" letter-spacing="0.14em">DEVSECOPS</text>
    <text x="44" y="516" fill="#f8faf8" font-size="22" font-weight="800">&lt; 48h CVE</text>
    <text x="44" y="536" fill="#a8b0ac" font-size="10">Critical remediation SLA</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="512" y="452" width="184" height="100" rx="14" fill="url(#panelFill)" stroke="#4d7264" stroke-opacity="0.5"/>
    <rect x="512" y="452" width="184" height="100" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="532" y="484" fill="#e8b878" font-size="10" font-weight="700" letter-spacing="0.14em">PLATFORM SLO</text>
    <text x="532" y="516" fill="#f8faf8" font-size="22" font-weight="800">99.97%</text>
    <text x="532" y="536" fill="#a8b0ac" font-size="10">Uptime across engagements</text>
  </g>
</svg>
