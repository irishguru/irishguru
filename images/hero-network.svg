<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none" aria-hidden="true">
  <defs>
    <!-- Copper gradient -->
    <linearGradient id="cu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c070"/>
      <stop offset="55%" stop-color="#d4924f"/>
      <stop offset="100%" stop-color="#8a5a24"/>
    </linearGradient>
    <!-- Sage gradient -->
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a9080"/>
      <stop offset="100%" stop-color="#1a3028"/>
    </linearGradient>
    <!-- Panel fill gradient -->
    <linearGradient id="pf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141e1a" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#070d0a" stop-opacity="0.90"/>
    </linearGradient>
    <!-- Tier edge highlight -->
    <linearGradient id="th" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c070" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Node ring copper -->
    <radialGradient id="nr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient hub glow -->
    <radialGradient id="hg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d4924f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <!-- Sage ambient glow -->
    <radialGradient id="sg2" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#3d6b58" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3d6b58" stop-opacity="0"/>
    </radialGradient>
    <!-- Node drop shadow -->
    <filter id="ns" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <!-- Hub glow filter -->
    <filter id="hf" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft glow filter for tiers -->
    <filter id="tf" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#d4924f" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ─── Ambient glow layers ─── -->
  <ellipse cx="360" cy="272" rx="250" ry="200" fill="url(#hg)"/>
  <ellipse cx="360" cy="285" rx="310" ry="245" fill="url(#sg2)"/>

  <!-- ─── Isometric floor grid ─── -->
  <g opacity="0.18" stroke-linecap="round">
    <!-- Main horizontal perspective lines -->
    <path d="M80 452 L360 318 L640 452" stroke="#4a7060" stroke-width="1.1"/>
    <path d="M148 486 L360 370 L572 486" stroke="#3d5a4f" stroke-width="0.8"/>
    <path d="M216 514 L360 418 L504 514" stroke="#2a4038" stroke-width="0.6"/>
    <!-- Vertical grid lines -->
    <line x1="220" y1="452" x2="220" y2="528" stroke="#3d5a4f" stroke-width="0.8"/>
    <line x1="290" y1="406" x2="290" y2="540" stroke="#3d5a4f" stroke-width="0.55"/>
    <line x1="360" y1="318" x2="360" y2="548" stroke="#4a7060" stroke-width="1"/>
    <line x1="430" y1="406" x2="430" y2="540" stroke="#3d5a4f" stroke-width="0.55"/>
    <line x1="500" y1="452" x2="500" y2="528" stroke="#3d5a4f" stroke-width="0.8"/>
  </g>

  <!-- ─── Isometric platform stack — 3 tiers ─── -->

  <!-- Tier 1: Foundation (largest) — Infrastructure -->
  <g filter="url(#tf)">
    <!-- Top face -->
    <path d="M192 348 L360 263 L528 348 L360 433 Z" fill="#050807" stroke="url(#sg)" stroke-opacity="0.42" stroke-width="1.5"/>
    <!-- Right face -->
    <path d="M528 348 L528 384 L360 469 L360 433 Z" fill="#080f0c" stroke="#3d5a4f" stroke-opacity="0.28" stroke-width="1"/>
    <!-- Left face -->
    <path d="M192 348 L192 384 L360 469 L360 433 Z" fill="#070e0b" stroke="#3d5a4f" stroke-opacity="0.28" stroke-width="1"/>
    <!-- Top face edge highlight -->
    <path d="M192 348 L360 263" stroke="url(#sg)" stroke-opacity="0.55" stroke-width="1"/>
  </g>

  <!-- Tier 2: Platform Core (medium) -->
  <g filter="url(#tf)">
    <!-- Top face -->
    <path d="M228 322 L360 248 L492 322 L360 396 Z" fill="#0c1812" stroke="url(#cu)" stroke-opacity="0.32" stroke-width="1.25"/>
    <!-- Right face -->
    <path d="M492 322 L492 352 L360 426 L360 396 Z" fill="#101e18" stroke="#d4924f" stroke-opacity="0.2" stroke-width="0.75"/>
    <!-- Left face -->
    <path d="M228 322 L228 352 L360 426 L360 396 Z" fill="#0e1c16" stroke="#d4924f" stroke-opacity="0.2" stroke-width="0.75"/>
    <!-- Top face edge highlights -->
    <path d="M228 322 L360 248 L492 322" stroke="url(#cu)" stroke-opacity="0.38" stroke-width="1" fill="none"/>
  </g>

  <!-- Tier 3: AI Core (top, smallest) -->
  <g filter="url(#tf)">
    <!-- Top face -->
    <path d="M276 300 L360 258 L444 300 L360 342 Z" fill="#132019" stroke="url(#th)" stroke-width="1.5"/>
    <!-- Right face -->
    <path d="M444 300 L444 321 L360 363 L360 342 Z" fill="#172618" stroke="#d4924f" stroke-opacity="0.3" stroke-width="0.75"/>
    <!-- Left face -->
    <path d="M276 300 L276 321 L360 363 L360 342 Z" fill="#152418" stroke="#d4924f" stroke-opacity="0.3" stroke-width="0.75"/>
    <!-- Top highlight line -->
    <path d="M276 300 L360 258 L444 300" stroke="#f0c070" stroke-opacity="0.55" stroke-width="1.25" fill="none"/>
  </g>

  <!-- ─── Central hub ─── -->
  <!-- Outer orbit ring dashed -->
  <circle cx="360" cy="285" r="58" stroke="#d4924f" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="2 9"/>
  <!-- Inner ring -->
  <circle cx="360" cy="285" r="38" stroke="#d4924f" stroke-opacity="0.22" stroke-width="0.75"/>
  <!-- Hub body -->
  <circle cx="360" cy="285" r="26" fill="#040705" stroke="url(#cu)" stroke-width="2" filter="url(#hf)"/>
  <!-- Hub centre glyph: inner circle -->
  <circle cx="360" cy="285" r="12" fill="#d4924f" fill-opacity="0.88"/>
  <!-- Hub specular highlight -->
  <circle cx="355" cy="280" r="4" fill="#fff" fill-opacity="0.28"/>
  <!-- Hub crosshair marks -->
  <line x1="348" y1="285" x2="372" y2="285" stroke="#fff" stroke-opacity="0.15" stroke-width="0.75"/>
  <line x1="360" y1="273" x2="360" y2="297" stroke="#fff" stroke-opacity="0.15" stroke-width="0.75"/>

  <!-- ─── Connection lines from hub (360,285) to 6 nodes ─── -->
  <!-- Hexagonal positions, r≈148:
       AI      (360, 137)   → 0°   top
       Cloud   (488, 211)   → 60°  top-right
       SecOps  (488, 359)   → 120° bottom-right
       Platform(360, 433)   → 180° bottom
       DevOps  (232, 359)   → 240° bottom-left
       Data    (232, 211)   → 300° top-left  -->
  <g stroke="#d4924f" stroke-opacity="0.16" stroke-width="1" stroke-dasharray="3 7">
    <line x1="360" y1="259" x2="360" y2="163"/>
    <line x1="360" y1="262" x2="464" y2="225"/>
    <line x1="360" y1="308" x2="464" y2="345"/>
    <line x1="360" y1="311" x2="360" y2="409"/>
    <line x1="360" y1="308" x2="256" y2="345"/>
    <line x1="360" y1="262" x2="256" y2="225"/>
  </g>
  <!-- Sage accent lines (horizontal pair) -->
  <g stroke="#4a7060" stroke-opacity="0.18" stroke-width="0.75">
    <line x1="386" y1="285" x2="462" y2="285"/>
    <line x1="258" y1="285" x2="334" y2="285"/>
  </g>

  <!-- ─── Data flow markers on connection lines ─── -->
  <g fill="#d4924f" fill-opacity="0.65">
    <!-- To AI -->
    <circle cx="360" cy="200" r="2.5"/>
    <!-- To Cloud -->
    <circle cx="412" cy="244" r="2"/>
    <!-- To SecOps -->
    <circle cx="412" cy="326" r="2"/>
    <!-- To Platform -->
    <circle cx="360" cy="370" r="2.5"/>
    <!-- To DevOps -->
    <circle cx="308" cy="326" r="2"/>
    <!-- To Data -->
    <circle cx="308" cy="244" r="2"/>
  </g>

  <!-- ─── Node 1: AI & ML — top (360, 137) ─── -->
  <g filter="url(#ns)">
    <circle cx="360" cy="137" r="29" fill="url(#nr)"/>
    <circle cx="360" cy="137" r="25" fill="#0a1510" stroke="#d4924f" stroke-opacity="0.52" stroke-width="1.5"/>
    <circle cx="360" cy="137" r="15" fill="#132019" stroke="#d4924f" stroke-opacity="0.3" stroke-width="0.75"/>
  </g>
  <!-- AI glyph: hexagon shape -->
  <path d="M360 128 L367 132 L367 141 L360 145 L353 141 L353 132 Z" fill="none" stroke="#d4924f" stroke-opacity="0.82" stroke-width="1.25" stroke-linejoin="round"/>
  <circle cx="360" cy="137" r="3" fill="#d4924f" fill-opacity="0.7"/>
  <!-- Node label -->
  <text x="360" y="172" text-anchor="middle" fill="#c8d4cc" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" letter-spacing="0.1em">AI &amp; ML</text>

  <!-- ─── Node 2: Cloud — top-right (488, 211) ─── -->
  <g filter="url(#ns)">
    <circle cx="488" cy="211" r="27" fill="url(#nr)"/>
    <circle cx="488" cy="211" r="23" fill="#0a1510" stroke="#d4924f" stroke-opacity="0.45" stroke-width="1.25"/>
    <circle cx="488" cy="211" r="14" fill="#0f1a14" stroke="#d4924f" stroke-opacity="0.28" stroke-width="0.75"/>
  </g>
  <!-- Cloud glyph: arc cloud -->
  <path d="M480 213 Q478 207 484 206 Q485 202 490 203 Q494 200 497 203 Q501 202 500 207 Q502 211 499 213 Z" fill="none" stroke="#d4924f" stroke-opacity="0.75" stroke-width="1.25" stroke-linejoin="round"/>
  <text x="522" y="207" text-anchor="start" fill="#c8d4cc" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" letter-spacing="0.1em">CLOUD</text>
  <text x="522" y="218" text-anchor="start" fill="#7a9088" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" letter-spacing="0.06em">IE &amp; UK</text>

  <!-- ─── Node 3: DevSecOps — bottom-right (488, 359) ─── -->
  <g filter="url(#ns)">
    <circle cx="488" cy="359" r="27" fill="url(#sg2)"/>
    <circle cx="488" cy="359" r="23" fill="#0a1510" stroke="#4a8070" stroke-opacity="0.55" stroke-width="1.25"/>
    <circle cx="488" cy="359" r="14" fill="#0f1a14" stroke="#4a8070" stroke-opacity="0.32" stroke-width="0.75"/>
  </g>
  <!-- Shield glyph -->
  <path d="M488 351 L496 355 L496 362 Q496 367 488 370 Q480 367 480 362 L480 355 Z" fill="none" stroke="#5aaa88" stroke-opacity="0.78" stroke-width="1.25" stroke-linejoin="round"/>
  <text x="522" y="355" text-anchor="start" fill="#c8d4cc" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" letter-spacing="0.1em">DEVSECOPS</text>
  <text x="522" y="366" text-anchor="start" fill="#7a9088" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" letter-spacing="0.06em">&lt; 48h CVE SLA</text>

  <!-- ─── Node 4: Platform Engineering — bottom (360, 433) ─── -->
  <g filter="url(#ns)">
    <circle cx="360" cy="433" r="27" fill="url(#sg2)"/>
    <circle cx="360" cy="433" r="23" fill="#0a1510" stroke="#4a8070" stroke-opacity="0.5" stroke-width="1.25"/>
    <circle cx="360" cy="433" r="14" fill="#0f1a14" stroke="#4a8070" stroke-opacity="0.28" stroke-width="0.75"/>
  </g>
  <!-- Server layers glyph -->
  <rect x="353" y="426" width="14" height="4" rx="1" fill="none" stroke="#5aaa88" stroke-opacity="0.78" stroke-width="1.1"/>
  <rect x="353" y="432" width="14" height="4" rx="1" fill="none" stroke="#5aaa88" stroke-opacity="0.58" stroke-width="1.1"/>
  <rect x="353" y="438" width="14" height="4" rx="1" fill="none" stroke="#5aaa88" stroke-opacity="0.38" stroke-width="1.1"/>
  <text x="360" y="468" text-anchor="middle" fill="#c8d4cc" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" letter-spacing="0.1em">PLATFORM</text>

  <!-- ─── Node 5: DevOps — bottom-left (232, 359) ─── -->
  <g filter="url(#ns)">
    <circle cx="232" cy="359" r="27" fill="url(#nr)"/>
    <circle cx="232" cy="359" r="23" fill="#0a1510" stroke="#d4924f" stroke-opacity="0.42" stroke-width="1.25"/>
    <circle cx="232" cy="359" r="14" fill="#0f1a14" stroke="#d4924f" stroke-opacity="0.26" stroke-width="0.75"/>
  </g>
  <!-- Pipeline arrow glyph -->
  <path d="M224 359 L240 359 M235 354 L240 359 L235 364" fill="none" stroke="#d4924f" stroke-opacity="0.72" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="198" y="355" text-anchor="end" fill="#c8d4cc" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" letter-spacing="0.1em">DEVOPS</text>
  <text x="198" y="366" text-anchor="end" fill="#7a9088" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" letter-spacing="0.06em">CI/CD</text>

  <!-- ─── Node 6: Data & Analytics — top-left (232, 211) ─── -->
  <g filter="url(#ns)">
    <circle cx="232" cy="211" r="27" fill="url(#nr)"/>
    <circle cx="232" cy="211" r="23" fill="#0a1510" stroke="#d4924f" stroke-opacity="0.42" stroke-width="1.25"/>
    <circle cx="232" cy="211" r="14" fill="#0f1a14" stroke="#d4924f" stroke-opacity="0.26" stroke-width="0.75"/>
  </g>
  <!-- Bar chart glyph -->
  <rect x="224" y="215" width="3.5" height="5" rx="0.75" fill="#d4924f" fill-opacity="0.65"/>
  <rect x="229" y="211" width="3.5" height="9" rx="0.75" fill="#d4924f" fill-opacity="0.75"/>
  <rect x="234" y="207" width="3.5" height="13" rx="0.75" fill="#d4924f" fill-opacity="0.85"/>
  <text x="198" y="207" text-anchor="end" fill="#c8d4cc" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" letter-spacing="0.1em">DATA</text>
  <text x="198" y="218" text-anchor="end" fill="#7a9088" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" letter-spacing="0.06em">&amp; ANALYTICS</text>

  <!-- ─── Decorative: outer ring connectors (subtle arcs between nodes) ─── -->
  <!-- Top arc: AI to Cloud -->
  <path d="M377 128 Q435 118 478 202" stroke="#d4924f" stroke-opacity="0.09" stroke-width="0.75" fill="none"/>
  <!-- Right arc: Cloud to SecOps -->
  <path d="M498 230 Q508 285 498 340" stroke="#d4924f" stroke-opacity="0.09" stroke-width="0.75" fill="none"/>
  <!-- Left arc: Data to DevOps -->
  <path d="M222 230 Q212 285 222 340" stroke="#d4924f" stroke-opacity="0.09" stroke-width="0.75" fill="none"/>

  <!-- ─── Subtle corner grain mask (atmospheric) ─── -->
  <rect width="720" height="560" fill="url(#hg)" opacity="0.04"/>
</svg>
