<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d09a"/>
      <stop offset="40%" stop-color="#d4924f"/>
      <stop offset="100%" stop-color="#6b4420"/>
    </linearGradient>
    <linearGradient id="sage" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#142820"/>
      <stop offset="100%" stop-color="#4d7264"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161f1b"/>
      <stop offset="100%" stop-color="#060a08"/>
    </linearGradient>
    <linearGradient id="panelEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3d5a4f" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.65"/>
      <stop offset="45%" stop-color="#d4924f" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotTop" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="720" height="580" fill="transparent"/>
  <ellipse cx="360" cy="280" rx="300" ry="220" fill="url(#coreGlow)"/>
  <rect width="720" height="290" fill="url(#spotTop)"/>

  <!-- isometric floor grid -->
  <g opacity="0.4">
    <path d="M60 440 L360 300 L660 440" stroke="#3d5a4f" stroke-width="1.25"/>
    <path d="M140 490 L360 380 L580 490" stroke="#2d4a40" stroke-width="0.75"/>
    <path d="M220 520 L360 450 L500 520" stroke="#1e332b" stroke-width="0.5"/>
    <line x1="180" y1="440" x2="180" y2="530" stroke="#2d4a40" stroke-width="0.6"/>
    <line x1="280" y1="370" x2="280" y2="540" stroke="#2d4a40" stroke-width="0.6"/>
    <line x1="360" y1="300" x2="360" y2="550" stroke="#3d5a4f" stroke-width="1"/>
    <line x1="440" y1="370" x2="440" y2="540" stroke="#2d4a40" stroke-width="0.6"/>
    <line x1="540" y1="440" x2="540" y2="530" stroke="#2d4a40" stroke-width="0.6"/>
  </g>

  <!-- platform base — 3D stack -->
  <path d="M120 400 L360 270 L600 400 L360 530 Z" fill="#050a08" stroke="url(#sage)" stroke-opacity="0.5" stroke-width="1.5"/>
  <path d="M360 270 L600 400 L600 355 L360 225 Z" fill="#08120e" stroke="url(#sage)" stroke-opacity="0.3"/>
  <path d="M120 400 L360 530 L360 485 L120 355 Z" fill="#07100c" stroke="url(#sage)" stroke-opacity="0.3"/>
  <path d="M185 365 L360 280 L535 365 L360 450 Z" fill="url(#panel)" stroke="url(#panelEdge)" stroke-width="1"/>
  <path d="M235 340 L360 285 L485 340 L360 395 Z" fill="#0e1814" stroke="#d4924f" stroke-opacity="0.55" stroke-width="1.25"/>

  <!-- core hub -->
  <circle cx="360" cy="318" r="58" stroke="url(#copper)" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 8"/>
  <circle cx="360" cy="318" r="40" stroke="#3d5a4f" stroke-opacity="0.25" stroke-width="0.75"/>
  <circle cx="360" cy="318" r="36" fill="#040806" stroke="url(#copper)" stroke-width="2.5" filter="url(#softGlow)"/>
  <circle cx="360" cy="318" r="14" fill="url(#copper)"/>
  <circle cx="354" cy="312" r="4" fill="#fff" fill-opacity="0.35"/>

  <!-- connection arcs -->
  <path d="M360 318 Q280 340 240 365" stroke="#d4924f" stroke-opacity="0.35" stroke-width="1.5" fill="none"/>
  <path d="M360 318 Q440 340 480 365" stroke="#d4924f" stroke-opacity="0.35" stroke-width="1.5" fill="none"/>
  <path d="M360 318 Q310 380 290 415" stroke="#3d5a4f" stroke-opacity="0.45" stroke-width="1" fill="none"/>
  <path d="M360 318 Q410 380 430 415" stroke="#3d5a4f" stroke-opacity="0.45" stroke-width="1" fill="none"/>
  <circle cx="240" cy="365" r="14" fill="#0a1410" stroke="#d4924f" stroke-opacity="0.55"/>
  <circle cx="480" cy="365" r="14" fill="#0a1410" stroke="#d4924f" stroke-opacity="0.55"/>
  <circle cx="290" cy="415" r="10" fill="#0a1410" stroke="#3d5a4f" stroke-opacity="0.7"/>
  <circle cx="430" cy="415" r="10" fill="#0a1410" stroke="#3d5a4f" stroke-opacity="0.7"/>

  <!-- floating panels -->
  <g filter="url(#panelShadow)">
    <rect x="28" y="48" width="188" height="112" rx="16" fill="url(#panel)" stroke="url(#copper)" stroke-opacity="0.45"/>
    <rect x="28" y="48" width="188" height="1" rx="0.5" fill="url(#copper)" fill-opacity="0.6"/>
    <text x="48" y="82" fill="#d4924f" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.14em">AI GOVERNANCE</text>
    <text x="48" y="116" fill="#f4f6f4" font-family="system-ui,sans-serif" font-size="28" font-weight="800">Production</text>
    <text x="48" y="140" fill="#7a8480" font-size="11">Regulated model pipelines</text>
    <rect x="48" y="148" width="132" height="6" rx="3" fill="#1a2822"/>
    <rect x="48" y="148" width="108" height="6" rx="3" fill="url(#copper)"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="504" y="28" width="188" height="112" rx="16" fill="url(#panel)" stroke="#3d5a4f" stroke-opacity="0.55"/>
    <text x="524" y="62" fill="#7a8480" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.14em">CLOUD LANDING</text>
    <text x="524" y="96" fill="#f4f6f4" font-family="system-ui,sans-serif" font-size="28" font-weight="800">Multi-zone</text>
    <text x="524" y="120" fill="#7a8480" font-size="11">IE &amp; UK data residency</text>
    <circle cx="668" cy="52" r="5" fill="#3d5a4f"/>
    <circle cx="668" cy="52" r="2" fill="#6b9a88"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="40" y="448" width="196" height="104" rx="16" fill="url(#panel)" stroke="url(#copper)" stroke-opacity="0.35"/>
    <text x="60" y="482" fill="#7a8480" font-size="10" font-weight="700" letter-spacing="0.14em">DEVSECOPS</text>
    <text x="60" y="516" fill="#f4f6f4" font-size="26" font-weight="800">&lt; 48h CVE</text>
    <text x="60" y="538" fill="#7a8480" font-size="10">Critical remediation SLA</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="484" y="448" width="196" height="104" rx="16" fill="url(#panel)" stroke="#3d5a4f" stroke-opacity="0.5"/>
    <text x="504" y="482" fill="#d4924f" font-size="10" font-weight="700" letter-spacing="0.14em">PLATFORM SLO</text>
    <text x="504" y="516" fill="#f4f6f4" font-size="26" font-weight="800">99.97%</text>
    <text x="504" y="538" fill="#7a8480" font-size="10">Uptime across engagements</text>
  </g>
</svg>
