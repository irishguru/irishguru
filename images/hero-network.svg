<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none" aria-hidden="true">
  <defs>

    <!-- Gradients -->
    <radialGradient id="bg-glow" cx="340" cy="275" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1f18"/>
      <stop offset="100%" stop-color="#020504"/>
    </radialGradient>
    <radialGradient id="hub-fill" cx="340" cy="275" r="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3028"/>
      <stop offset="100%" stop-color="#0a1610"/>
    </radialGradient>
    <radialGradient id="hub-glow" cx="340" cy="275" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="key-light" cx="580" cy="80" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fill-light" cx="80" cy="460" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3d5a4f" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#3d5a4f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spoke-cu" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="spoke-sg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d5a4f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3d5a4f" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="card-fill" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#141f1a"/>
      <stop offset="100%" stop-color="#0a1210"/>
    </linearGradient>
    <linearGradient id="node-cu" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e2e24"/>
      <stop offset="100%" stop-color="#0e1914"/>
    </linearGradient>
    <linearGradient id="node-sg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#162418"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
    <linearGradient id="ring-grad" cx="340" cy="275" r="168" x1="0" y1="0" x2="720" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#3d5a4f" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="hub-shadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#d4924f" flood-opacity="0.45"/>
    </filter>
    <filter id="node-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="line-glow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.7" fill="#ffffff" fill-opacity="0.055"/>
    </pattern>

  </defs>

  <!-- ── Background ── -->
  <rect width="720" height="560" fill="url(#bg-glow)"/>
  <rect width="720" height="560" fill="url(#dots)"/>
  <rect width="720" height="560" fill="url(#key-light)"/>
  <rect width="720" height="560" fill="url(#fill-light)"/>

  <!-- ── Outer pentagon ring (dashed) ── -->
  <!-- Connecting the 5 nodes: (340,110) (517,227) (457,412) (223,412) (163,227) -->
  <polygon points="340,110 517,227 457,412 223,412 163,227"
    stroke="url(#ring-grad)" stroke-width="1" stroke-dasharray="4 6"
    fill="none" stroke-opacity="0.55"/>

  <!-- ── Mid ring (subtle decorative circle) ── -->
  <circle cx="340" cy="275" r="168" stroke="#d4924f" stroke-opacity="0.07" stroke-width="0.75" stroke-dasharray="2 8"/>

  <!-- ── Hub glow ── -->
  <ellipse cx="340" cy="275" rx="68" ry="68" fill="url(#hub-glow)"/>

  <!-- ── Spoke lines (hub → each node) ── -->
  <!-- To top node (340, 110) -->
  <line x1="340" y1="243" x2="340" y2="140" stroke="#d4924f" stroke-width="1" stroke-opacity="0.45" filter="url(#line-glow)"/>
  <!-- Mid pulse dot on top spoke -->
  <circle cx="340" cy="192" r="3.5" fill="#d4924f" fill-opacity="0.65"/>

  <!-- To upper-right (517, 227) -->
  <line x1="364" y1="257" x2="489" y2="236" stroke="#d4924f" stroke-width="1" stroke-opacity="0.38" filter="url(#line-glow)"/>
  <circle cx="427" cy="246" r="3" fill="#d4924f" fill-opacity="0.5"/>

  <!-- To lower-right (457, 412) -->
  <line x1="358" y1="300" x2="433" y2="384" stroke="#3d5a4f" stroke-width="1" stroke-opacity="0.38" filter="url(#line-glow)"/>
  <circle cx="395" cy="342" r="3" fill="#3d5a4f" fill-opacity="0.55"/>

  <!-- To lower-left (223, 412) -->
  <line x1="322" y1="300" x2="247" y2="384" stroke="#3d5a4f" stroke-width="1" stroke-opacity="0.38" filter="url(#line-glow)"/>
  <circle cx="285" cy="342" r="3" fill="#3d5a4f" fill-opacity="0.55"/>

  <!-- To upper-left (163, 227) -->
  <line x1="316" y1="257" x2="191" y2="236" stroke="#3d5a4f" stroke-width="1" stroke-opacity="0.38" filter="url(#line-glow)"/>
  <circle cx="254" cy="246" r="3" fill="#3d5a4f" fill-opacity="0.5"/>

  <!-- ── Hub ── -->
  <circle cx="340" cy="275" r="38" fill="url(#hub-fill)" filter="url(#hub-shadow)"/>
  <circle cx="340" cy="275" r="38" stroke="#d4924f" stroke-width="1.5"/>
  <!-- Hub inner ring -->
  <circle cx="340" cy="275" r="26" stroke="#d4924f" stroke-opacity="0.25" stroke-width="0.75"/>
  <!-- Hub core fill -->
  <circle cx="340" cy="275" r="14" fill="#d4924f" fill-opacity="0.82"/>
  <circle cx="336" cy="271" r="5" fill="#ffffff" fill-opacity="0.24"/>
  <!-- Hub crosshairs -->
  <line x1="326" y1="275" x2="354" y2="275" stroke="#ffffff" stroke-opacity="0.18" stroke-width="0.75"/>
  <line x1="340" y1="261" x2="340" y2="289" stroke="#ffffff" stroke-opacity="0.18" stroke-width="0.75"/>

  <!-- ── Node 1: Artificial Intelligence (top, 340, 110) ── -->
  <g filter="url(#node-shadow)">
    <circle cx="340" cy="110" r="32" fill="url(#node-cu)" stroke="#d4924f" stroke-width="1.25"/>
  </g>
  <!-- AI glyph: simple brain-like curved lines -->
  <path d="M330,105 Q335,98 340,104 Q345,98 350,105 Q352,112 346,116 L340,119 L334,116 Q328,112 330,105Z" stroke="#d4924f" stroke-width="1.2" fill="none" stroke-opacity="0.8"/>
  <text x="340" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#d4924f">Artificial Intelligence</text>
  <text x="340" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#7a8f88">OpenAI · Databricks</text>

  <!-- ── Node 2: Cloud Enablement (upper-right, 517, 227) ── -->
  <g filter="url(#node-shadow)">
    <circle cx="517" cy="227" r="30" fill="url(#node-cu)" stroke="#d4924f" stroke-width="1" stroke-opacity="0.8"/>
  </g>
  <!-- Cloud glyph -->
  <path d="M506,228 Q506,220 514,219 Q514,213 522,215 Q528,210 530,218 Q535,218 535,224 Q535,230 529,230 L507,230 Q503,230 506,228Z" stroke="#d4924f" stroke-width="1.1" fill="none" stroke-opacity="0.75"/>
  <text x="546" y="232" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#e8d0a8">Cloud Enablement</text>
  <text x="546" y="245" font-family="system-ui, sans-serif" font-size="8.5" fill="#7a8f88">AWS · Azure · GCP</text>

  <!-- ── Node 3: Data &amp; Analytics (lower-right, 457, 412) ── -->
  <g filter="url(#node-shadow)">
    <circle cx="457" cy="412" r="30" fill="url(#node-sg)" stroke="#3d5a4f" stroke-width="1" stroke-opacity="0.9"/>
  </g>
  <!-- Bar chart glyph -->
  <rect x="445" y="408" width="5" height="10" rx="1.5" fill="#7fbfaa" fill-opacity="0.8"/>
  <rect x="452" y="404" width="5" height="14" rx="1.5" fill="#7fbfaa" fill-opacity="0.9"/>
  <rect x="459" y="400" width="5" height="18" rx="1.5" fill="#7fbfaa"/>
  <text x="457" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#7fbfaa">Data &amp; Analytics</text>
  <text x="457" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#6a8078">Snowflake · dbt · Kafka</text>

  <!-- ── Node 4: DevSecOps (lower-left, 223, 412) ── -->
  <g filter="url(#node-shadow)">
    <circle cx="223" cy="412" r="30" fill="url(#node-sg)" stroke="#3d5a4f" stroke-width="1" stroke-opacity="0.85"/>
  </g>
  <!-- Shield glyph -->
  <path d="M223,400 L231,403 L231,412 Q231,419 223,422 Q215,419 215,412 L215,403 Z" stroke="#7fbfaa" stroke-width="1.1" fill="none" stroke-opacity="0.85"/>
  <text x="223" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#7fbfaa">DevSecOps</text>
  <text x="223" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#6a8078">Snyk · Vault · SAST</text>

  <!-- ── Node 5: Platform Engineering (upper-left, 163, 227) ── -->
  <g filter="url(#node-shadow)">
    <circle cx="163" cy="227" r="30" fill="url(#node-cu)" stroke="#d4924f" stroke-width="1" stroke-opacity="0.75"/>
  </g>
  <!-- Server/stack glyph -->
  <rect x="151" y="217" width="24" height="7" rx="2" stroke="#d4924f" stroke-width="1.1" fill="none" stroke-opacity="0.8"/>
  <rect x="151" y="226" width="24" height="7" rx="2" stroke="#d4924f" stroke-width="1.1" fill="none" stroke-opacity="0.65"/>
  <rect x="151" y="235" width="24" height="7" rx="2" stroke="#d4924f" stroke-width="1.1" fill="none" stroke-opacity="0.5"/>
  <text x="110" y="264" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#e8d0a8">Platform Engineering</text>
  <text x="110" y="277" font-family="system-ui, sans-serif" font-size="8.5" fill="#7a8f88">K8s · Backstage · IaC</text>

  <!-- ── Floating info card 1 (top-right) ── -->
  <g filter="url(#card-shadow)">
    <rect x="556" y="82" width="146" height="80" rx="12" fill="url(#card-fill)"/>
    <rect x="556" y="82" width="146" height="80" rx="12" stroke="#d4924f" stroke-opacity="0.3"/>
    <rect x="556" y="82" width="146" height="2.5" rx="1.25" fill="#d4924f" fill-opacity="0.55"/>
  </g>
  <text x="572" y="105" font-family="system-ui, sans-serif" font-size="9" fill="#8a9890" font-weight="600" letter-spacing="1">REGULATED CLIENTS</text>
  <text x="572" y="130" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#d4924f" letter-spacing="-1">18</text>
  <text x="572" y="150" font-family="system-ui, sans-serif" font-size="9" fill="#7a8f88">FS, Telco, Public Sector</text>

  <!-- ── Floating info card 2 (lower-right) ── -->
  <g filter="url(#card-shadow)">
    <rect x="556" y="380" width="146" height="80" rx="12" fill="url(#card-fill)"/>
    <rect x="556" y="380" width="146" height="80" rx="12" stroke="#3d5a4f" stroke-opacity="0.4"/>
    <rect x="556" y="380" width="146" height="2.5" rx="1.25" fill="#3d5a4f" fill-opacity="0.75"/>
  </g>
  <text x="572" y="403" font-family="system-ui, sans-serif" font-size="9" fill="#8a9890" font-weight="600" letter-spacing="1">RENEWAL RATE</text>
  <text x="572" y="428" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#7fbfaa" letter-spacing="-1">94%</text>
  <text x="572" y="448" font-family="system-ui, sans-serif" font-size="9" fill="#6a8078">Contract satisfaction</text>

  <!-- ── Floating tag (left side, near Platform node) ── -->
  <g filter="url(#card-shadow)">
    <rect x="12" y="178" width="130" height="42" rx="8" fill="url(#card-fill)"/>
    <rect x="12" y="178" width="130" height="42" rx="8" stroke="#3d5a4f" stroke-opacity="0.35"/>
  </g>
  <circle cx="28" cy="199" r="3.5" fill="#4caf8a"/>
  <text x="40" y="195" font-family="system-ui, sans-serif" font-size="8.5" fill="#eef1ee" font-weight="600">ISO 27001-aligned</text>
  <text x="40" y="208" font-family="system-ui, sans-serif" font-size="8" fill="#7a8f88">Governance built in</text>

  <!-- ── Bottom floating tag ── -->
  <g filter="url(#card-shadow)">
    <rect x="204" y="492" width="272" height="42" rx="8" fill="url(#card-fill)"/>
    <rect x="204" y="492" width="272" height="42" rx="8" stroke="#d4924f" stroke-opacity="0.28"/>
  </g>
  <circle cx="222" cy="513" r="3.5" fill="#d4924f"/>
  <text x="234" y="509" font-family="system-ui, sans-serif" font-size="8.5" fill="#eef1ee" font-weight="600">Senior-led delivery — architects who ship</text>
  <text x="234" y="522" font-family="system-ui, sans-serif" font-size="8" fill="#7a8f88">Dublin HQ · Ireland and UK regulated delivery</text>

</svg>
