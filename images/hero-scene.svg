<svg viewBox="0 0 640 520" fill="none" xmlns="http://www.w3.org/2000/svg">

<style>
@media (prefers-reduced-motion: no-preference) {
  #pg-ai       { animation: drift-a 10s ease-in-out infinite alternate; }
  #pg-platform { animation: drift-b 13s ease-in-out infinite alternate; animation-delay: -5s; }
  #pg-cloud    { animation: drift-c 16s ease-in-out infinite alternate; animation-delay: -9s; }
  #nd-ai       { animation: pulse-nd 2.5s ease-in-out infinite; }
  #nd-pl       { animation: pulse-nd 3.2s ease-in-out infinite; animation-delay: -1.2s; }
  #nd-cl       { animation: pulse-nd 4s   ease-in-out infinite; animation-delay: -2.4s; }
  .scan-beam   { animation: scan 7s linear infinite; }
}
@keyframes drift-a  { from { transform: translateY(0);    } to { transform: translateY(-10px); } }
@keyframes drift-b  { from { transform: translateY(-4px); } to { transform: translateY(9px);  } }
@keyframes drift-c  { from { transform: translateY(2px);  } to { transform: translateY(-7px); } }
@keyframes pulse-nd { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
@keyframes scan     { from { transform: translateY(-140px); } to { transform: translateY(660px); } }
</style>

<defs>

  <!-- Drop shadow for panel depth -->
  <filter id="f-shadow" x="-18%" y="-18%" width="136%" height="136%">
    <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity="0.64"/>
  </filter>

  <!-- Copper edge glow -->
  <filter id="f-cu" x="-20%" y="-100%" width="140%" height="300%">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Emerald edge glow -->
  <filter id="f-em" x="-20%" y="-100%" width="140%" height="300%">
    <feGaussianBlur stdDeviation="2.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Blue edge glow -->
  <filter id="f-bl" x="-20%" y="-100%" width="140%" height="300%">
    <feGaussianBlur stdDeviation="2.2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Atmospheric ambient blur -->
  <filter id="f-atm" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="34"/>
  </filter>

  <!-- Panel fills (per-layer glass tone) -->
  <linearGradient id="gl-ai" gradientUnits="userSpaceOnUse" x1="170" y1="96" x2="582" y2="226">
    <stop offset="0%"   stop-color="#1e0e04" stop-opacity="0.94"/>
    <stop offset="60%"  stop-color="#140900" stop-opacity="0.88"/>
    <stop offset="100%" stop-color="#1a0c02" stop-opacity="0.91"/>
  </linearGradient>

  <linearGradient id="gl-pl" gradientUnits="userSpaceOnUse" x1="120" y1="230" x2="536" y2="360">
    <stop offset="0%"   stop-color="#041c10" stop-opacity="0.92"/>
    <stop offset="60%"  stop-color="#031408" stop-opacity="0.86"/>
    <stop offset="100%" stop-color="#04180e" stop-opacity="0.89"/>
  </linearGradient>

  <linearGradient id="gl-cl" gradientUnits="userSpaceOnUse" x1="70" y1="360" x2="476" y2="488">
    <stop offset="0%"   stop-color="#04101e" stop-opacity="0.82"/>
    <stop offset="60%"  stop-color="#030c1a" stop-opacity="0.76"/>
    <stop offset="100%" stop-color="#041018" stop-opacity="0.78"/>
  </linearGradient>

  <!-- Top reflection stripe (frosted glass feel) -->
  <linearGradient id="hl-ai" gradientUnits="userSpaceOnUse" x1="0" y1="96" x2="0" y2="160">
    <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="hl-pl" gradientUnits="userSpaceOnUse" x1="0" y1="230" x2="0" y2="292">
    <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="hl-cl" gradientUnits="userSpaceOnUse" x1="0" y1="360" x2="0" y2="416">
    <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>

  <!-- Ambient atmospheric glows -->
  <radialGradient id="bg-cu" cx="70%" cy="28%" r="40%">
    <stop offset="0%"   stop-color="#e09840" stop-opacity="0.24"/>
    <stop offset="100%" stop-color="#e09840" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="bg-em" cx="22%" cy="72%" r="32%">
    <stop offset="0%"   stop-color="#22c878" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#22c878" stop-opacity="0"/>
  </radialGradient>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="13" cy="13" r="0.7" fill="#ffffff" fill-opacity="0.11"/>
  </pattern>

</defs>

<!-- ?? ATMOSPHERE ?? -->
<ellipse cx="455" cy="152" rx="225" ry="148" fill="#e09840" fill-opacity="0.16" filter="url(#f-atm)"/>
<ellipse cx="182" cy="392" rx="178" ry="118" fill="#22c878" fill-opacity="0.14" filter="url(#f-atm)"/>
<rect width="640" height="520" fill="url(#dots)" opacity="0.55"/>

<!-- Diagonal scan beam (data-refresh / live feed feel) -->
<line class="scan-beam" x1="40" y1="0" x2="610" y2="20"
      stroke="rgba(224,152,64,0.18)" stroke-width="0.8"/>

<!-- ?? CONNECTOR LINES between panel anchor points ?? -->
<line x1="170" y1="139" x2="120" y2="272"
      stroke="rgba(255,255,255,0.10)" stroke-width="0.5" stroke-dasharray="6,5"/>
<line x1="120" y1="318" x2="70"  y2="400"
      stroke="rgba(255,255,255,0.08)" stroke-width="0.5" stroke-dasharray="6,5"/>

<!-- ???????????????????????????????????????????????????????????
     LAYER 1: CLOUD FOUNDATION (background, bottom)
     Panel vertices: (70,360) (460,400) (476,488) (86,448)
     ??????????????????????????????????????????????????????????? -->
<g id="pg-cloud" filter="url(#f-shadow)">
  <!-- Slab depth Ś bottom face -->
  <polygon points="86,448 476,488 476,498 86,458" fill="#020810" fill-opacity="0.92"/>
  <!-- Slab depth Ś right face -->
  <polygon points="460,400 476,488 476,498 460,410" fill="#020a12" fill-opacity="0.88"/>
  <!-- Main glass surface -->
  <polygon points="70,360 460,400 476,488 86,448"  fill="url(#gl-cl)"/>
  <!-- Top glass reflection -->
  <polygon points="70,360 460,400 463,418 73,378"  fill="url(#hl-cl)"/>
  <!-- Border outline -->
  <polygon points="70,360 460,400 476,488 86,448"
           fill="none" stroke="#3a9fe0" stroke-width="0.5" stroke-opacity="0.28"/>
  <!-- Top edge glow (blue) -->
  <line x1="70" y1="360" x2="460" y2="400"
        stroke="#3a9fe0" stroke-width="1.3" stroke-opacity="0.70" filter="url(#f-bl)"/>

  <!-- Layer label -->
  <text x="108" y="384"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="7" font-weight="700" letter-spacing="2.5"
        fill="#7ab8e8" fill-opacity="0.72">CLOUD FOUNDATION</text>

  <!-- Tech pills -->
  <g font-family="system-ui,sans-serif" font-size="7" fill="#9ed0f0" fill-opacity="0.92">
    <rect x="108" y="394" width="28" height="16" rx="4"
          fill="#3a9fe0" fill-opacity="0.12" stroke="#3a9fe0" stroke-width="0.5" stroke-opacity="0.40"/>
    <text x="122" y="405.5" text-anchor="middle">AWS</text>

    <rect x="142" y="394" width="32" height="16" rx="4"
          fill="#3a9fe0" fill-opacity="0.10" stroke="#3a9fe0" stroke-width="0.5" stroke-opacity="0.34"/>
    <text x="158" y="405.5" text-anchor="middle">Azure</text>

    <rect x="180" y="394" width="28" height="16" rx="4"
          fill="#3a9fe0" fill-opacity="0.10" stroke="#3a9fe0" stroke-width="0.5" stroke-opacity="0.34"/>
    <text x="194" y="405.5" text-anchor="middle">GCP</text>

    <rect x="214" y="394" width="46" height="16" rx="4"
          fill="#3a9fe0" fill-opacity="0.08" stroke="#3a9fe0" stroke-width="0.5" stroke-opacity="0.28"/>
    <text x="237" y="405.5" text-anchor="middle">OpenShift</text>
  </g>

  <!-- Cloud icon -->
  <g transform="translate(426,368)" fill="none" stroke="#3a9fe0" stroke-opacity="0.52" stroke-width="1.1">
    <path d="M9,14.5 Q7,14.5 7,12 Q7,9.5 9.5,9.5 Q10,7 12.5,7 Q15,7 15.5,9.5 Q18,9.5 18,12 Q18,14.5 15.5,14.5Z"/>
    <line x1="10" y1="14.5" x2="10" y2="18"/>
    <line x1="15" y1="14.5" x2="15" y2="18"/>
    <line x1="8"  y1="18"   x2="17" y2="18"/>
  </g>

  <!-- Anchor node -->
  <circle id="nd-cl" cx="70" cy="400" r="2.8" fill="#3a9fe0" fill-opacity="0.85"/>
</g>

<!-- ???????????????????????????????????????????????????????????
     LAYER 2: PLATFORM CORE (middle)
     Panel vertices: (120,230) (520,272) (536,360) (136,318)
     ??????????????????????????????????????????????????????????? -->
<g id="pg-platform" filter="url(#f-shadow)">
  <!-- Slab depth Ś bottom face -->
  <polygon points="136,318 536,360 536,370 136,328" fill="#010e07" fill-opacity="0.93"/>
  <!-- Slab depth Ś right face -->
  <polygon points="520,272 536,360 536,370 520,282" fill="#010e08" fill-opacity="0.89"/>
  <!-- Main glass surface -->
  <polygon points="120,230 520,272 536,360 136,318" fill="url(#gl-pl)"/>
  <!-- Top glass reflection -->
  <polygon points="120,230 520,272 523,288 123,246" fill="url(#hl-pl)"/>
  <!-- Border -->
  <polygon points="120,230 520,272 536,360 136,318"
           fill="none" stroke="#22c878" stroke-width="0.5" stroke-opacity="0.28"/>
  <!-- Top edge glow (emerald) -->
  <line x1="120" y1="230" x2="520" y2="272"
        stroke="#22c878" stroke-width="1.5" stroke-opacity="0.76" filter="url(#f-em)"/>

  <!-- Layer label -->
  <text x="158" y="254"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="7" font-weight="700" letter-spacing="2.5"
        fill="#6ad4a0" fill-opacity="0.80">PLATFORM CORE</text>

  <!-- Tech pills -->
  <g font-family="system-ui,sans-serif" font-size="7" fill="#8aeac0" fill-opacity="0.90">
    <rect x="158" y="264" width="48" height="16" rx="4"
          fill="#22c878" fill-opacity="0.12" stroke="#22c878" stroke-width="0.5" stroke-opacity="0.40"/>
    <text x="182" y="275.5" text-anchor="middle">Kubernetes</text>

    <rect x="212" y="264" width="34" height="16" rx="4"
          fill="#22c878" fill-opacity="0.10" stroke="#22c878" stroke-width="0.5" stroke-opacity="0.34"/>
    <text x="229" y="275.5" text-anchor="middle">ArgoCD</text>

    <rect x="252" y="264" width="42" height="16" rx="4"
          fill="#22c878" fill-opacity="0.10" stroke="#22c878" stroke-width="0.5" stroke-opacity="0.34"/>
    <text x="273" y="275.5" text-anchor="middle">Terraform</text>

    <rect x="300" y="264" width="30" height="16" rx="4"
          fill="#22c878" fill-opacity="0.08" stroke="#22c878" stroke-width="0.5" stroke-opacity="0.28"/>
    <text x="315" y="275.5" text-anchor="middle">Vault</text>
  </g>

  <!-- Server layers icon -->
  <g transform="translate(489,241)" fill="none" stroke="#22c878" stroke-opacity="0.55" stroke-width="1.1">
    <rect x="0" y="0"  width="20" height="6" rx="1.5"/>
    <rect x="0" y="8"  width="20" height="6" rx="1.5"/>
    <rect x="0" y="16" width="20" height="6" rx="1.5"/>
    <circle cx="3" cy="3"  r="1" fill="#22c878" fill-opacity="0.70"/>
    <circle cx="3" cy="11" r="1" fill="#22c878" fill-opacity="0.70"/>
    <circle cx="3" cy="19" r="1" fill="#22c878" fill-opacity="0.70"/>
  </g>

  <!-- Anchor node -->
  <circle id="nd-pl" cx="120" cy="272" r="3.5" fill="#22c878" fill-opacity="0.88"/>
</g>

<!-- ???????????????????????????????????????????????????????????
     LAYER 3: AI & INTELLIGENCE (foreground, top)
     Panel vertices: (170,96) (570,140) (582,226) (182,182)
     ??????????????????????????????????????????????????????????? -->
<g id="pg-ai" filter="url(#f-shadow)">
  <!-- Slab depth Ś bottom face (visible, gives 3D slab feel) -->
  <polygon points="182,182 582,226 582,236 182,192" fill="#130800" fill-opacity="0.93"/>
  <!-- Slab depth Ś right face -->
  <polygon points="570,140 582,226 582,236 570,150" fill="#0e0600" fill-opacity="0.89"/>
  <!-- Main glass surface -->
  <polygon points="170,96 570,140 582,226 182,182"  fill="url(#gl-ai)"/>
  <!-- Top glass reflection -->
  <polygon points="170,96 570,140 573,158 173,114"  fill="url(#hl-ai)"/>
  <!-- Border outline -->
  <polygon points="170,96 570,140 582,226 182,182"
           fill="none" stroke="#e09840" stroke-width="0.6" stroke-opacity="0.36"/>
  <!-- Top edge glow (copper Ś strongest, foreground layer) -->
  <line x1="170" y1="96"  x2="570" y2="140"
        stroke="#e09840" stroke-width="2.2" stroke-opacity="0.92" filter="url(#f-cu)"/>
  <!-- Right edge accent -->
  <line x1="570" y1="140" x2="582" y2="226"
        stroke="#e09840" stroke-width="1.0" stroke-opacity="0.55"/>

  <!-- Active pulse node (anchors the AI panel, most prominent) -->
  <circle id="nd-ai" cx="182" cy="139" r="4.5" fill="#e09840"/>

  <!-- Layer label -->
  <text x="212" y="122"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="8" font-weight="700" letter-spacing="2.5"
        fill="#f5c060" fill-opacity="0.94">AI &amp; INTELLIGENCE</text>

  <!-- Tech pills -->
  <g font-family="system-ui,sans-serif" font-size="7.5" fill="#f5c060" fill-opacity="0.95">
    <rect x="212" y="134" width="56" height="18" rx="4"
          fill="#e09840" fill-opacity="0.16" stroke="#e09840" stroke-width="0.5" stroke-opacity="0.48"/>
    <text x="240" y="147" text-anchor="middle">Azure OpenAI</text>

    <rect x="274" y="134" width="48" height="18" rx="4"
          fill="#e09840" fill-opacity="0.12" stroke="#e09840" stroke-width="0.5" stroke-opacity="0.40"/>
    <text x="298" y="147" text-anchor="middle">Databricks</text>

    <rect x="328" y="134" width="26" height="18" rx="4"
          fill="#e09840" fill-opacity="0.10" stroke="#e09840" stroke-width="0.5" stroke-opacity="0.35"/>
    <text x="341" y="147" text-anchor="middle">dbt</text>
  </g>

  <!-- Abstract AI / network icon -->
  <g transform="translate(534,102)" fill="none" stroke="#e09840" stroke-opacity="0.62" stroke-width="1.1">
    <circle cx="12" cy="10" r="9"/>
    <line x1="12" y1="1"  x2="12" y2="19"/>
    <line x1="3"  y1="5"  x2="21" y2="15"/>
    <line x1="3"  y1="15" x2="21" y2="5"/>
    <circle cx="12" cy="10" r="2.5" fill="#e09840" fill-opacity="0.25" stroke="none"/>
  </g>
</g>

<!-- ?? Small ambient particle nodes (visual richness) ?? -->
<circle cx="380" cy="68"  r="1.5" fill="#e09840" fill-opacity="0.45"/>
<circle cx="580" cy="290" r="1.2" fill="#e09840" fill-opacity="0.38"/>
<circle cx="60"  cy="298" r="1.3" fill="#22c878" fill-opacity="0.42"/>
<circle cx="490" cy="448" r="1.2" fill="#3a9fe0" fill-opacity="0.38"/>
<circle cx="280" cy="500" r="1.0" fill="#22c878" fill-opacity="0.30"/>

</svg>
