<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="520" y2="360">
      <stop offset="0%" stop-color="#c98547"/>
      <stop offset="100%" stop-color="#2d4a40"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c080"/>
      <stop offset="100%" stop-color="#8a5a2a"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="360">
      <stop offset="0%" stop-color="#0a1410"/>
      <stop offset="100%" stop-color="#060a08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="520" height="360" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="518" height="358" rx="15" stroke="url(#dg)" stroke-opacity="0.35"/>
  <text x="28" y="36" fill="#d4924f" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.14em">ENGAGEMENT IMPACT</text>
  <text x="28" y="68" fill="#eef1ee" font-family="system-ui,sans-serif" font-size="26" font-weight="800">Delivery metrics</text>

  <g transform="translate(28,96)">
    <text x="0" y="14" fill="#7a8480" font-size="10" font-weight="600">Deploy frequency</text>
    <rect x="0" y="22" width="200" height="8" rx="4" fill="#1a2420"/>
    <rect x="0" y="22" width="176" height="8" rx="4" fill="url(#bar)"/>
    <text x="210" y="30" fill="#d4924f" font-size="14" font-weight="800">3.8ū</text>

    <text x="0" y="58" fill="#7a8480" font-size="10" font-weight="600">Cost reduction</text>
    <rect x="0" y="66" width="200" height="8" rx="4" fill="#1a2420"/>
    <rect x="0" y="66" width="144" height="8" rx="4" fill="url(#bar)"/>
    <text x="210" y="74" fill="#d4924f" font-size="14" font-weight="800">30%</text>

    <text x="0" y="102" fill="#7a8480" font-size="10" font-weight="600">Audit closure</text>
    <rect x="0" y="110" width="200" height="8" rx="4" fill="#1a2420"/>
    <rect x="0" y="110" width="188" height="8" rx="4" fill="url(#bar)"/>
    <text x="210" y="118" fill="#d4924f" font-size="14" font-weight="800">94%</text>
  </g>

  <g transform="translate(280,88)">
    <circle cx="100" cy="100" r="78" stroke="#1f2b26" stroke-width="14"/>
    <circle cx="100" cy="100" r="78" stroke="#d4924f" stroke-width="14" stroke-dasharray="368 490" stroke-linecap="round" transform="rotate(-90 100 100)" filter="url(#glow)"/>
    <text x="100" y="96" text-anchor="middle" fill="#eef1ee" font-size="28" font-weight="800">94%</text>
    <text x="100" y="118" text-anchor="middle" fill="#7a8480" font-size="10" font-weight="600">Renewal rate</text>
  </g>

  <g transform="translate(28,220)">
    <text x="0" y="-8" fill="#7a8480" font-size="10" font-weight="600">Release velocity Ś 12 month trend</text>
    <line x1="0" y1="90" x2="360" y2="90" stroke="#1a2420" stroke-width="1"/>
    <polyline points="0,80 40,55 80,62 120,35 160,42 200,18 240,28 280,8 320,20 360,0" fill="none" stroke="#d4924f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <polyline points="0,80 40,55 80,62 120,35 160,42 200,18 240,28 280,8 320,20 360,0 360,90 0,90" fill="url(#dg)" fill-opacity="0.12"/>
    <circle cx="360" cy="0" r="4" fill="#d4924f"/>
  </g>

  <rect x="28" y="318" width="132" height="28" rx="6" fill="#132019" stroke="#d4924f" stroke-opacity="0.35"/>
  <circle cx="44" cy="332" r="3" fill="#4ade80"/>
  <text x="54" y="337" fill="#d4924f" font-size="10" font-weight="700">LIVE IN PRODUCTION</text>
