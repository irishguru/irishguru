<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="dl" x1="0" y1="0" x2="560" y2="0">
      <stop offset="0%" stop-color="#3d5a4f"/>
      <stop offset="50%" stop-color="#d4924f"/>
      <stop offset="100%" stop-color="#3d5a4f"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="320">
      <stop offset="0%" stop-color="#0a1210"/>
      <stop offset="100%" stop-color="#060a08"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="560" height="320" rx="16" fill="url(#bg)"/>
  <rect width="560" height="160" fill="url(#spot)"/>
  <rect x="1" y="1" width="558" height="318" rx="15" stroke="#d4924f" stroke-opacity="0.15"/>
  <text x="24" y="36" fill="#d4924f" font-size="11" font-weight="700" letter-spacing="0.14em">DELIVERY LIFECYCLE</text>
  <text x="24" y="64" fill="#eef1ee" font-size="20" font-weight="800">Outcome milestones, not billable hours</text>

  <!-- trajectory with glow -->
  <path d="M40 210 Q140 125 280 168 T520 145" stroke="url(#dl)" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M40 210 Q140 125 280 168 T520 145" stroke="url(#dl)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <g>
    <circle cx="80" cy="210" r="38" fill="#0c1612" stroke="#d4924f" stroke-opacity="0.45"/>
    <text x="80" y="206" text-anchor="middle" fill="#eef1ee" font-size="11" font-weight="700">Discover</text>
    <text x="80" y="222" text-anchor="middle" fill="#7a8480" font-size="9">2–4 wks</text>
  </g>
  <g>
    <circle cx="200" cy="158" r="38" fill="#0c1612" stroke="#3d5a4f"/>
    <text x="200" y="154" text-anchor="middle" fill="#eef1ee" font-size="11" font-weight="700">Design</text>
    <text x="200" y="170" text-anchor="middle" fill="#7a8480" font-size="9">Architecture</text>
  </g>
  <g>
    <circle cx="320" cy="182" r="44" fill="#132019" stroke="#d4924f" stroke-width="2"/>
    <circle cx="320" cy="182" r="52" stroke="#d4924f" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 6"/>
    <text x="320" y="178" text-anchor="middle" fill="#d4924f" font-size="12" font-weight="700">Deliver</text>
    <text x="320" y="194" text-anchor="middle" fill="#eef1ee" font-size="9">Production</text>
  </g>
  <g>
    <circle cx="440" cy="160" r="38" fill="#0c1612" stroke="#3d5a4f"/>
    <text x="440" y="156" text-anchor="middle" fill="#eef1ee" font-size="11" font-weight="700">Operate</text>
    <text x="440" y="172" text-anchor="middle" fill="#7a8480" font-size="9">Handover</text>
  </g>
  <g>
    <circle cx="520" cy="145" r="30" fill="#0c1612" stroke="#d4924f" stroke-opacity="0.65"/>
    <text x="520" y="149" text-anchor="middle" fill="#d4924f" font-size="10" font-weight="800">Exit</text>
  </g>

  <rect x="24" y="252" width="512" height="48" rx="10" fill="#0a1210" stroke="#2d4a40"/>
  <text x="40" y="282" fill="#7a8480" font-size="11">Weekly sponsor reviews · measurable exit criteria · runbooks included</text>
</svg>
