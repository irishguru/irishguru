<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="dl-bg" x1="0" y1="0" x2="0" y2="300">
      <stop offset="0%" stop-color="#080f0c"/>
      <stop offset="100%" stop-color="#040806"/>
    </linearGradient>
    <linearGradient id="dl-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d4a40" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#d4924f"/>
      <stop offset="60%" stop-color="#d4924f"/>
      <stop offset="100%" stop-color="#2d4a40" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="dl-node-cu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2e26"/>
      <stop offset="100%" stop-color="#0e1812"/>
    </linearGradient>
    <linearGradient id="dl-node-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3226"/>
      <stop offset="100%" stop-color="#0c1f14"/>
    </linearGradient>
    <radialGradient id="dl-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dl-node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <filter id="dl-shad">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="dl-glow-f">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dl-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20,0 L0,0 L0,20" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="560" height="300" rx="16" fill="url(#dl-bg)"/>
  <rect width="560" height="300" rx="16" fill="url(#dl-grid)"/>

  <!-- Ambient glow -->
  <ellipse cx="280" cy="150" rx="220" ry="90" fill="url(#dl-glow)" opacity="0.55"/>

  <!-- Frame -->
  <rect x="1" y="1" width="558" height="298" rx="15" stroke="#d4924f" stroke-opacity="0.14"/>

  <!-- Header -->
  <text x="24" y="34" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="700" letter-spacing="0.14em" fill="#d4924f">DELIVERY LIFECYCLE</text>
  <text x="24" y="54" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#8fa89a">Outcome milestones, not billable hours</text>

  <!-- Timeline track -->
  <rect x="64" y="143" width="432" height="4" rx="2" fill="#1a2820"/>
  <rect x="64" y="143" width="432" height="4" rx="2" fill="url(#dl-line)" filter="url(#dl-glow-f)"/>

  <!-- ?? Node 1: Discover ?? -->
  <g>
    <!-- Node circle -->
    <circle cx="86" cy="145" r="30" fill="url(#dl-node-cu)" stroke="#3d5a4f" stroke-opacity="0.55"/>
    <circle cx="86" cy="145" r="30" stroke="#d4924f" stroke-opacity="0.22" stroke-width="0.75"/>
    <!-- Node number -->
    <text x="86" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#d4924f">01</text>
    <!-- Node label -->
    <text x="86" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#eef1ee">Discover</text>
    <!-- Duration badge -->
    <rect x="58" y="186" width="56" height="18" rx="4" fill="#0c1410" stroke="#2d4a40" stroke-opacity="0.5"/>
    <text x="86" y="199" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#7fbfaa">2–4 wks</text>
  </g>

  <!-- ?? Node 2: Architect ?? -->
  <g>
    <circle cx="194" cy="145" r="30" fill="url(#dl-node-cu)" stroke="#3d5a4f" stroke-opacity="0.5"/>
    <circle cx="194" cy="145" r="30" stroke="#d4924f" stroke-opacity="0.18" stroke-width="0.75"/>
    <text x="194" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#d4924f">02</text>
    <text x="194" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#eef1ee">Architect</text>
    <rect x="163" y="186" width="62" height="18" rx="4" fill="#0c1410" stroke="#2d4a40" stroke-opacity="0.45"/>
    <text x="194" y="199" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#7fbfaa">Signed-off ADR</text>
  </g>

  <!-- ?? Node 3: DELIVER (highlighted) ?? -->
  <g filter="url(#dl-shad)">
    <!-- Outer glow ring -->
    <circle cx="280" cy="145" r="44" fill="url(#dl-node-glow)"/>
    <circle cx="280" cy="145" r="38" stroke="#d4924f" stroke-opacity="0.22" stroke-dasharray="3 5"/>
    <!-- Main node -->
    <circle cx="280" cy="145" r="32" fill="url(#dl-node-hi)" stroke="#d4924f" stroke-width="1.5"/>
    <rect x="248" y="113" width="64" height="3" rx="1.5" fill="#d4924f" fill-opacity="0.55"/>
    <text x="280" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#f0c080">DELIVER</text>
    <text x="280" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#eef1ee">Production</text>
    <!-- Duration -->
    <rect x="248" y="188" width="64" height="18" rx="4" fill="#101e16" stroke="#d4924f" stroke-opacity="0.45"/>
    <text x="280" y="201" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#d4924f">Avg 11 wks</text>
  </g>

  <!-- ?? Node 4: Operate ?? -->
  <g>
    <circle cx="366" cy="145" r="30" fill="url(#dl-node-cu)" stroke="#3d5a4f" stroke-opacity="0.5"/>
    <circle cx="366" cy="145" r="30" stroke="#d4924f" stroke-opacity="0.18" stroke-width="0.75"/>
    <text x="366" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#d4924f">04</text>
    <text x="366" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#eef1ee">Operate</text>
    <rect x="336" y="186" width="60" height="18" rx="4" fill="#0c1410" stroke="#2d4a40" stroke-opacity="0.45"/>
    <text x="366" y="199" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#7fbfaa">Runbooks</text>
  </g>

  <!-- ?? Node 5: Exit ?? -->
  <g>
    <circle cx="474" cy="145" r="30" fill="url(#dl-node-cu)" stroke="#d4924f" stroke-opacity="0.45"/>
    <text x="474" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="800" fill="#d4924f">05</text>
    <text x="474" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#eef1ee">Exit</text>
    <rect x="444" y="186" width="60" height="18" rx="4" fill="#0c1410" stroke="#2d4a40" stroke-opacity="0.45"/>
    <text x="474" y="199" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#7fbfaa">Clean handover</text>
  </g>

  <!-- Footer bar -->
  <rect x="20" y="236" width="520" height="46" rx="10" fill="#0a100d" stroke="#1e2e26"/>
  <circle cx="40" cy="259" r="4" fill="#4caf8a"/>
  <text x="54" y="263" font-family="system-ui,sans-serif" font-size="9.5" fill="#5a8070" font-weight="600">GOVERNANCE BUILT IN</text>
  <text x="174" y="263" font-family="system-ui,sans-serif" font-size="9.5" fill="#3d5060">·</text>
  <text x="186" y="263" font-family="system-ui,sans-serif" font-size="9.5" fill="#5a706a">Weekly sponsor reviews</text>
  <text x="314" y="263" font-family="system-ui,sans-serif" font-size="9.5" fill="#3d5060">·</text>
  <text x="326" y="263" font-family="system-ui,sans-serif" font-size="9.5" fill="#5a706a">Measurable exit criteria</text>
  <text x="468" y="263" font-family="system-ui,sans-serif" font-size="9.5" fill="#3d5060">·</text>
  <text x="480" y="263" font-family="system-ui,sans-serif" font-size="9.5" fill="#5a706a">ISO aligned</text>
</svg>
