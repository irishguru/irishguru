<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="dl-bg" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080f0c"/>
      <stop offset="100%" stop-color="#040806"/>
    </linearGradient>
    <linearGradient id="dl-line" x1="0" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2d4a40" stop-opacity="0.6"/>
      <stop offset="38%" stop-color="#d4924f"/>
      <stop offset="62%" stop-color="#d4924f"/>
      <stop offset="100%" stop-color="#2d4a40" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="dl-node-fill" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a2e24"/>
      <stop offset="100%" stop-color="#0c1812"/>
    </linearGradient>
    <linearGradient id="dl-hi-fill" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e3226"/>
      <stop offset="100%" stop-color="#0c1f14"/>
    </linearGradient>
    <radialGradient id="dl-ambient" cx="280" cy="150" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dl-node-glow" cx="280" cy="145" r="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <filter id="dl-drop">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="dl-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dl-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="560" height="300" rx="16" fill="url(#dl-bg)"/>
  <rect width="560" height="300" rx="16" fill="url(#dl-dots)"/>
  <rect width="560" height="300" fill="url(#dl-ambient)"/>

  <!-- Frame -->
  <rect x="1" y="1" width="558" height="298" rx="15" stroke="#d4924f" stroke-opacity="0.15"/>

  <!-- Header -->
  <text x="24" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" letter-spacing="2" fill="#d4924f">DELIVERY LIFECYCLE</text>
  <text x="24" y="53" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#8fa89a">Outcome milestones, not billable hours</text>

  <!-- Timeline track base -->
  <rect x="66" y="141" width="428" height="8" rx="4" fill="#0e1a14"/>
  <!-- Timeline track glow -->
  <rect x="66" y="143" width="428" height="4" rx="2" fill="url(#dl-line)" filter="url(#dl-glow)"/>

  <!-- Node 1: Discover -->
  <g filter="url(#dl-drop)">
    <circle cx="86" cy="145" r="30" fill="url(#dl-node-fill)" stroke="#3d5a4f" stroke-width="1" stroke-opacity="0.6"/>
  </g>
  <text x="86" y="141" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#d4924f">01</text>
  <text x="86" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#eef1ee">Discover</text>
  <rect x="58" y="185" width="56" height="17" rx="4" fill="#0a1210" stroke="#2d4a40" stroke-opacity="0.55"/>
  <text x="86" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7fbfaa">2 to 4 wks</text>

  <!-- Node 2: Architect -->
  <g filter="url(#dl-drop)">
    <circle cx="194" cy="145" r="30" fill="url(#dl-node-fill)" stroke="#3d5a4f" stroke-width="1" stroke-opacity="0.55"/>
  </g>
  <text x="194" y="141" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#d4924f">02</text>
  <text x="194" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#eef1ee">Architect</text>
  <rect x="163" y="185" width="62" height="17" rx="4" fill="#0a1210" stroke="#2d4a40" stroke-opacity="0.5"/>
  <text x="194" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7fbfaa">Signed ADR</text>

  <!-- Node 3: DELIVER (highlighted) -->
  <circle cx="280" cy="145" r="44" fill="url(#dl-node-glow)"/>
  <circle cx="280" cy="145" r="38" stroke="#d4924f" stroke-opacity="0.22" stroke-dasharray="3 5"/>
  <g filter="url(#dl-drop)">
    <circle cx="280" cy="145" r="32" fill="url(#dl-hi-fill)" stroke="#d4924f" stroke-width="1.5"/>
  </g>
  <rect x="248" y="113" width="64" height="2.5" rx="1.25" fill="#d4924f" fill-opacity="0.6"/>
  <text x="280" y="141" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#f0c080">DELIVER</text>
  <text x="280" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#eef1ee">Production</text>
  <rect x="248" y="188" width="64" height="17" rx="4" fill="#0e1c12" stroke="#d4924f" stroke-opacity="0.45"/>
  <text x="280" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#d4924f">Avg 11 wks</text>

  <!-- Node 4: Operate -->
  <g filter="url(#dl-drop)">
    <circle cx="366" cy="145" r="30" fill="url(#dl-node-fill)" stroke="#3d5a4f" stroke-width="1" stroke-opacity="0.55"/>
  </g>
  <text x="366" y="141" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#d4924f">04</text>
  <text x="366" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#eef1ee">Operate</text>
  <rect x="336" y="185" width="60" height="17" rx="4" fill="#0a1210" stroke="#2d4a40" stroke-opacity="0.5"/>
  <text x="366" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7fbfaa">Runbooks</text>

  <!-- Node 5: Exit -->
  <g filter="url(#dl-drop)">
    <circle cx="474" cy="145" r="30" fill="url(#dl-node-fill)" stroke="#d4924f" stroke-width="1" stroke-opacity="0.45"/>
  </g>
  <text x="474" y="141" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="#d4924f">05</text>
  <text x="474" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" font-weight="600" fill="#eef1ee">Exit</text>
  <rect x="444" y="185" width="60" height="17" rx="4" fill="#0a1210" stroke="#2d4a40" stroke-opacity="0.45"/>
  <text x="474" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7fbfaa">Handover</text>

  <!-- Footer bar -->
  <rect x="20" y="234" width="520" height="48" rx="10" fill="#0a100d" stroke="#1c2e22" stroke-opacity="0.8"/>
  <circle cx="40" cy="258" r="4" fill="#4caf8a"/>
  <text x="54" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#5a8070" font-weight="600">GOVERNANCE BUILT IN</text>
  <rect x="188" y="250" width="1" height="16" fill="#2d4a40" fill-opacity="0.6"/>
  <text x="200" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#5a706a">Weekly sponsor reviews</text>
  <rect x="336" y="250" width="1" height="16" fill="#2d4a40" fill-opacity="0.6"/>
  <text x="348" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#5a706a">Measurable exit criteria</text>
  <rect x="484" y="250" width="1" height="16" fill="#2d4a40" fill-opacity="0.6"/>
  <text x="496" y="262" font-family="system-ui, sans-serif" font-size="9" fill="#5a706a">ISO aligned</text>
</svg>
