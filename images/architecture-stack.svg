<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 370" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="a-bg" x1="0" y1="0" x2="0" y2="370">
      <stop offset="0%" stop-color="#070e0b"/>
      <stop offset="100%" stop-color="#030604"/>
    </linearGradient>
    <linearGradient id="a-cu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a4e22" stop-opacity="0"/>
      <stop offset="28%" stop-color="#d4924f"/>
      <stop offset="72%" stop-color="#d4924f"/>
      <stop offset="100%" stop-color="#7a4e22" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a-sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a3028" stop-opacity="0"/>
      <stop offset="28%" stop-color="#3d5a4f"/>
      <stop offset="72%" stop-color="#3d5a4f"/>
      <stop offset="100%" stop-color="#1a3028" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a-dk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e1e18" stop-opacity="0"/>
      <stop offset="28%" stop-color="#1e3028"/>
      <stop offset="72%" stop-color="#1e3028"/>
      <stop offset="100%" stop-color="#0e1e18" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="a-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#d4924f" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#d4924f" stop-opacity="0"/>
    </radialGradient>
    <filter id="a-shad">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <pattern id="a-grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22,0 L0,0 L0,22" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background + texture -->
  <rect width="520" height="370" rx="16" fill="url(#a-bg)"/>
  <rect width="520" height="370" rx="16" fill="url(#a-grid)"/>
  <ellipse cx="260" cy="155" rx="210" ry="125" fill="url(#a-glow)"/>

  <!-- Frame border -->
  <rect x="1" y="1" width="518" height="368" rx="15" stroke="#d4924f" stroke-opacity="0.13"/>

  <!-- Title area -->
  <text x="24" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="700" letter-spacing="0.14em" fill="#d4924f">TARGET ARCHITECTURE</text>
  <text x="24" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#8fa89a">Irish Guru platform delivery blueprint</text>

  <!-- ?? TIER 1: AI & Intelligence ?? -->
  <g filter="url(#a-shad)">
    <rect x="20" y="66" width="480" height="82" rx="10" fill="#111e18"/>
    <rect x="20" y="66" width="480" height="82" rx="10" stroke="url(#a-cu)" stroke-opacity="0.5"/>
    <rect x="20" y="66" width="480" height="3" rx="1.5" fill="#d4924f" fill-opacity="0.58"/>
    <text x="36" y="89" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700" letter-spacing="0.12em" fill="#d4924f">AI &amp; INTELLIGENCE</text>
    <!-- Pills -->
    <rect x="36" y="98" width="82" height="27" rx="6" fill="#0b1610" stroke="#d4924f" stroke-opacity="0.35"/>
    <text x="77" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#e8cfa8">Azure OpenAI</text>
    <rect x="126" y="98" width="70" height="27" rx="6" fill="#0b1610" stroke="#d4924f" stroke-opacity="0.22"/>
    <text x="161" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Databricks</text>
    <rect x="204" y="98" width="60" height="27" rx="6" fill="#0b1610" stroke="#d4924f" stroke-opacity="0.22"/>
    <text x="234" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Snowflake</text>
    <rect x="272" y="98" width="48" height="27" rx="6" fill="#0b1610" stroke="#d4924f" stroke-opacity="0.22"/>
    <text x="296" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Vertex AI</text>
    <rect x="328" y="98" width="38" height="27" rx="6" fill="#0b1610" stroke="#d4924f" stroke-opacity="0.22"/>
    <text x="347" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">dbt</text>
  </g>

  <!-- Arrow 1?2 -->
  <g opacity="0.5">
    <line x1="260" y1="149" x2="260" y2="168" stroke="#d4924f" stroke-width="1.5" stroke-dasharray="3 2.5"/>
    <polygon points="255,168 265,168 260,177" fill="#d4924f"/>
  </g>

  <!-- ?? TIER 2: Platform Core ?? -->
  <g filter="url(#a-shad)">
    <rect x="20" y="179" width="480" height="82" rx="10" fill="#0d1812"/>
    <rect x="20" y="179" width="480" height="82" rx="10" stroke="url(#a-sg)" stroke-opacity="0.5"/>
    <rect x="20" y="179" width="480" height="3" rx="1.5" fill="#3d5a4f" fill-opacity="0.75"/>
    <text x="36" y="202" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700" letter-spacing="0.12em" fill="#7fbfaa">PLATFORM CORE</text>
    <rect x="36" y="211" width="72" height="27" rx="6" fill="#080e0b" stroke="#3d5a4f" stroke-opacity="0.42"/>
    <text x="72" y="229" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Kubernetes</text>
    <rect x="116" y="211" width="62" height="27" rx="6" fill="#080e0b" stroke="#3d5a4f" stroke-opacity="0.28"/>
    <text x="147" y="229" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Terraform</text>
    <rect x="186" y="211" width="64" height="27" rx="6" fill="#080e0b" stroke="#3d5a4f" stroke-opacity="0.28"/>
    <text x="218" y="229" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Backstage</text>
    <rect x="258" y="211" width="54" height="27" rx="6" fill="#080e0b" stroke="#3d5a4f" stroke-opacity="0.28"/>
    <text x="285" y="229" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">ArgoCD</text>
    <rect x="320" y="211" width="84" height="27" rx="6" fill="#080e0b" stroke="#3d5a4f" stroke-opacity="0.28"/>
    <text x="362" y="229" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">GitHub Actions</text>
  </g>

  <!-- Arrow 2?3 -->
  <g opacity="0.42">
    <line x1="260" y1="262" x2="260" y2="281" stroke="#3d5a4f" stroke-width="1.5" stroke-dasharray="3 2.5"/>
    <polygon points="255,281 265,281 260,290" fill="#3d5a4f"/>
  </g>

  <!-- ?? TIER 3: Cloud & Data Infrastructure ?? -->
  <g filter="url(#a-shad)">
    <rect x="20" y="292" width="480" height="64" rx="10" fill="#090d0c"/>
    <rect x="20" y="292" width="480" height="64" rx="10" stroke="url(#a-dk)" stroke-opacity="0.55"/>
    <rect x="20" y="292" width="480" height="3" rx="1.5" fill="#2d4a40" fill-opacity="0.9"/>
    <text x="36" y="315" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700" letter-spacing="0.12em" fill="#5a8070">CLOUD &amp; SECURITY FOUNDATION</text>
    <rect x="36" y="323" width="44" height="26" rx="6" fill="#050908" stroke="#2d4a40" stroke-opacity="0.48"/>
    <text x="58" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">AWS</text>
    <rect x="88" y="323" width="48" height="26" rx="6" fill="#050908" stroke="#2d4a40" stroke-opacity="0.3"/>
    <text x="112" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Azure</text>
    <rect x="144" y="323" width="42" height="26" rx="6" fill="#050908" stroke="#2d4a40" stroke-opacity="0.3"/>
    <text x="165" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">GCP</text>
    <rect x="194" y="323" width="44" height="26" rx="6" fill="#050908" stroke="#2d4a40" stroke-opacity="0.3"/>
    <text x="216" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Kafka</text>
    <rect x="246" y="323" width="44" height="26" rx="6" fill="#050908" stroke="#2d4a40" stroke-opacity="0.3"/>
    <text x="268" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Vault</text>
    <rect x="298" y="323" width="44" height="26" rx="6" fill="#050908" stroke="#2d4a40" stroke-opacity="0.3"/>
    <text x="320" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">Snyk</text>
    <rect x="350" y="323" width="64" height="26" rx="6" fill="#050908" stroke="#2d4a40" stroke-opacity="0.3"/>
    <text x="382" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#eef1ee">OpenShift</text>
  </g>
</svg>
